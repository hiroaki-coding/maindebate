name = "maindebate"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "maindebate.hiroaki-for-cording.workers.dev"
WORKER_URL = "http://localhost:8788"
ENABLE_TEMP_CORS_DOMAINS = "true"

# 開発サーバー設定
[dev]
port = 8788

# Durable Objects
[[durable_objects.bindings]]
name = "DEBATE_ROOM"
class_name = "DebateRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DebateRoom"]

# 本番環境
[env.production]
vars = { ENVIRONMENT = "production", WORKER_URL = "https://api.debatelive.example.com", ENABLE_TEMP_CORS_DOMAINS = "false" }

# シークレット（wrangler secret putで設定）
# - SUPABASE_URL
# - SUPABASE_SERVICE_KEY
# - FIREBASE_PROJECT_ID
# - GEMINI_API_KEY
# - INTERNAL_SECRET
# - TURNSTILE_SECRET_KEY
# - ADMIN_PANEL_PASSWORD
# - ADMIN_TOTP_SECRET
